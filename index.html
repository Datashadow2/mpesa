<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="theme-color"
        content="#000000">

    <title>M-PESA Message Generator</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/generator.css">
    <link rel="stylesheet" href="css/conversation.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<!-- ==========================================
HOME PAGE
========================================== -->

<section
    id="homePage"
    class="page active">

    <div class="page-content">

        <header class="home-header">

            <h1 class="app-title">

                Message

            </h1>

            <p class="app-subtitle">

                SMS confirmations.

            </p>

        </header>

        <main class="home-menu">

            <button
                id="sendMoney"
                class="menu-button">

                Send Money

            </button>

            <button
                id="pochi"
                class="menu-button">

                Pochi la Biashara

            </button>

            <button
                id="buyGoods"
                class="menu-button">

                Buy Goods & Services

            </button>

            <button
                id="openSettings"
                class="menu-button secondary">

                Settings

            </button>

        </main>

    </div>

</section>

<!-- ==========================================
GENERATOR PAGE
========================================== -->

<section
    id="generatorPage"
    class="page">

    <div class="page-content">

        <header class="page-header">

            <button
                class="back-button"
                data-back>

                ←

            </button>

            <h2
                id="generatorTitle">

                Send Money

            </h2>

        </header>

        <form
            id="generatorForm"
            autocomplete="off">

            <!-- Recipient -->

            <div
                id="recipientField"
                class="form-group">

                <label for="recipient">

                    Recipient Name

                </label>

                <input
                    id="recipient"
                    type="text"
                    placeholder="John Doe">

            </div>

            <!-- Phone -->

            <div
                id="phoneField"
                class="form-group">

                <label for="phone">

                    Phone Number

                </label>

                <input
                    id="phone"
                    type="tel"
                    placeholder="0712345678">

            </div>

            <!-- Business -->

            <div
                id="businessField"
                class="form-group">

                <label for="business">

                    Business Name

                </label>

                <input
                    id="business"
                    type="text"
                    placeholder="Business Name">

            </div>

            <!-- Till -->

            <div
                id="tillNumberField"
                class="form-group">

                <label for="tillNumber">

                    Till Number

                </label>

                <input
                    id="tillNumber"
                    type="number"
                    placeholder="123456">

            </div>

            <!-- Amount -->

            <div class="form-group">

                <label for="amount">

                    Amount (KES)

                </label>

                <input
                    id="amount"
                    type="number"
                    placeholder="0">

            </div>

            <!-- Current Balance -->

            <div class="form-group">

                <label for="balance">

                    Current M-PESA Balance

                </label>

                <input
                    id="balance"
                    type="number"
                    placeholder="0">

            </div>

            <button
                id="generateButton"
                type="button"
                class="generate-button">

                Generate SMS

            </button>

        </form>

    </div>

</section>

<!-- ==========================================
CONVERSATION PAGE
========================================== -->

<section
    id="chatPage"
    class="page">

    <div class="page-content conversation-page">

        <header class="page-header">

            <button
                class="back-button"
                data-back>

                ←

            </button>

            <h2>

                MPESA

            </h2>

        </header>

        <main
            id="generatedMessage"
            class="conversation-container">

            <!--

            Messages will be inserted here by JavaScript.

            Structure of each generated message:

            <div class="message-group">

                <div class="sms-bubble">

                    Message...

                </div>

                <div class="preview-card">

                    Tap to load preview

                </div>

                <div class="message-time">

                    Today, 11:58 AM

                </div>

            </div>

            -->

        </main>

        <!-- This stays at the bottom.
             Only ONE reply notice in the whole conversation. -->

        <footer class="conversation-footer">

            <div class="reply-notice">

                Sender can't accept replies.

                <span>

                    Contact them directly.

                </span>

                <a href="#">

                    Learn more

                </a>

            </div>

        </footer>

    </div>

</section>

<!-- ==========================================
SETTINGS PAGE
========================================== -->

<section
    id="settingsPage"
    class="page">

    <div class="page-content">

        <header class="page-header">

            <button
                class="back-button"
                data-back>

                ←

            </button>

            <h2>

                Settings

            </h2>

        </header>

        <div class="settings-content">

            <div class="form-group">

                <label
                    for="defaultBalance">

                    Default Balance

                </label>

                <input
                    id="defaultBalance"
                    type="number"
                    placeholder="5000">

            </div>

            <div class="checkbox-group">

                <label
                    for="rememberBalance">

                    Remember Balance

                </label>

                <input
                    id="rememberBalance"
                    type="checkbox"
                    checked>

            </div>

            <button
                type="button"
                class="menu-button"
                onclick="saveSettings()">

                Save Settings

            </button>

            <button
                type="button"
                class="menu-button secondary"
                onclick="resetSettings()">

                Reset Settings

            </button>

        </div>

    </div>

</section>
</div>

<!-- ==========================================
JAVASCRIPT
========================================== -->

<script src="js/utils.js"></script>
<script src="js/settings.js"></script>
<script src="js/validation.js"></script>
<script src="js/templates.js"></script>
<script src="js/navigation.js"></script>
<script src="js/generator.js"></script>
<script src="js/app.js"></script>

</body>

</html>
