<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <title>M-PESA Message Generator</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/mpesa/manifest.json" />
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/mpesa/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen active">
            <div class="home-header">
                <h1>Message</h1>
                <p>Confirmation messages.</p>
            </div>
            <div class="home-actions">
                <button class="home-btn" data-transaction="send">Send Money</button>
                <button class="home-btn" data-transaction="pochi">Pochi la Biashara</button>
                <button class="home-btn" data-transaction="goods">Buy Goods &amp; Services</button>
                <button class="home-btn" data-target="settings-screen">Settings</button>
            </div>
        </div>

        <!-- GENERATOR SCREEN -->
        <div id="generator-screen" class="screen">
            <div class="generator-card">
                <h2 id="generator-title">Send Money</h2>
                <form id="generator-form" novalidate>
                    <!-- dynamic fields injected here -->
                    <div id="form-fields"></div>
                    <button type="submit" class="generate-btn">Generate SMS</button>
                </form>
            </div>
        </div>

        <!-- CONVERSATION SCREEN -->
        <div id="conversation-screen" class="screen">
            <div id="message-list">
                <!-- messages appear here -->
            </div>
            <div id="conversation-footer">
                <span>Sender can't accept replies.</span>
                <span>Contact them directly.</span>
                <span class="learn-more">Learn more</span>
            </div>
        </div>

        <!-- SETTINGS SCREEN -->
        <div id="settings-screen" class="screen">
            <div class="settings-card">
                <h2>Settings</h2>
                <div class="setting-group">
                    <label for="default-balance">Default Balance (Ksh)</label>
                    <input type="number" id="default-balance" min="0" step="0.01" value="5000" />
                </div>
                <div class="setting-group toggle-group">
                    <label for="remember-balance">Remember Balance</label>
                    <input type="checkbox" id="remember-balance" checked />
                </div>
                <div class="settings-actions">
                    <button id="save-settings" class="settings-btn primary">Save Settings</button>
                    <button id="reset-settings" class="settings-btn secondary">Reset Settings</button>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        
    </div>

    <script src="script.js"></script>
</body>
</html>
