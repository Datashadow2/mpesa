<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>M-PESA Message Generator</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/generator.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<!-- ==========================================================
HOME PAGE
=========================================================== -->

<section
    id="homePage"
    class="page active">

    <div class="home-container">

        <h1 class="app-title">

            M-PESA Message Generator

        </h1>

        <p class="subtitle">

            Generate realistic M-PESA confirmation messages.

        </p>

        <div class="menu">

            <button

                id="sendMoney"

                class="menu-button">

                Send Money

            </button>

            <button

                id="pochi"

                class="menu-button">

                Pochi la Biashara

            </button>

            <button

                id="buyGoods"

                class="menu-button">

                Buy Goods & Services

            </button>

            <button

                id="openSettings"

                class="menu-button secondary">

                Settings

            </button>

        </div>

    </div>

</section>

<!-- ==========================================================
GENERATOR PAGE
=========================================================== -->

<section

    id="generatorPage"

    class="page">

<div class="generator-container">

<header class="page-header">

<button

    data-back

    class="back-button">

    ←

</button>

<h2

    id="generatorTitle">

    Transaction

</h2>

</header>

<form

    id="generatorForm"

    autocomplete="off">

<!-- Recipient -->

<div

    id="recipientField"

    class="form-group">

<label>

Recipient Name

</label>

<input

type="text"

id="recipient"

placeholder="John Doe">

</div>

<!-- Phone -->

<div

id="phoneField"

class="form-group">

<label>

Phone Number

</label>

<input

type="text"

id="phone"

placeholder="0712345678">

</div>

<!-- Business -->

<div

id="businessField"

class="form-group">

<label>

Business Name

</label>

<input

type="text"

id="business"

placeholder="Business">

</div>

<!-- Till -->

<div

id="tillNumberField"

class="form-group">

<label>

Till Number

</label>

<input

type="text"

id="tillNumber"

placeholder="123456">

</div>

<!-- Amount -->

<div

class="form-group">

<label>

Amount (KES)

</label>

<input

type="number"

id="amount"

placeholder="0.00">

</div>

<!-- Balance -->

<div

class="form-group">

<label>

Current Balance

</label>

<input

type="number"

id="balance"

placeholder="0.00">

</div>

<button

type="button"

id="generateButton"

class="generate-button">

Generate SMS

</button>

</form>

</div>

</section>

<!-- ==========================================================
CONVERSATION PAGE
=========================================================== -->

<section

    id="chatPage"

    class="page">

    <div class="conversation-container">

        <header class="page-header">

            <button

                data-back

                class="back-button">

                ←

            </button>

            <h2>

                MPESA

            </h2>

        </header>

        <div

            id="generatedMessage"

            class="conversation">

            <!-- Messages are generated here -->

        </div>

    </div>

</section>

<!-- ==========================================================
SETTINGS PAGE
=========================================================== -->

<section

    id="settingsPage"

    class="page">

    <div class="settings-container">

        <header class="page-header">

            <button

                data-back

                class="back-button">

                ←

            </button>

            <h2>

                Settings

            </h2>

        </header>

        <div class="settings-content">

            <div class="form-group">

                <label>

                    Default Balance

                </label>

                <input

                    type="number"

                    id="defaultBalance"

                    placeholder="5000">

            </div>

            <div class="form-group remember-setting">

                <label

                    for="rememberBalance">

                    Remember Balance

                </label>

                <input

                    type="checkbox"

                    id="rememberBalance"

                    checked>

            </div>

            <button

                type="button"

                class="menu-button"

                onclick="saveSettings()">

                Save Settings

            </button>

            <button

                type="button"

                class="menu-button secondary"

                onclick="resetSettings()">

                Reset Settings

            </button>

        </div>

    </div>

</section>

</div>

<!-- ==========================================================
JAVASCRIPT
=========================================================== -->

<script src="js/utils.js"></script>
<script src="js/settings.js"></script>
<script src="js/validation.js"></script>
<script src="js/templates.js"></script>
<script src="js/navigation.js"></script>
<script src="js/generator.js"></script>
<script src="js/app.js"></script>

</body>

</html>
